<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0712" />
      <stop offset="50%" stop-color="#0f0c1b" />
      <stop offset="100%" stop-color="#05040a" />
    </linearGradient>

    <!-- Brain Gradient (Warm Purple/Violet) -->
    <linearGradient id="brain-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3e8ff" />
      <stop offset="40%" stop-color="#d8b4fe" />
      <stop offset="100%" stop-color="#9333ea" />
    </linearGradient>

    <!-- Text Gradient (White to Light Violet) -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e9d8fd" />
    </linearGradient>

    <!-- Glowing Radial Blobs -->
    <radialGradient id="glow-left" cx="20%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04" />
    </pattern>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Blur Filter for Shadow -->
    <filter id="glow-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" />
    </filter>

    <!-- Google Fonts Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@800;900&amp;family=Plus+Jakarta+Sans:wght@500;700;800&amp;display=swap');
      
      .title-text {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 900;
        font-size: 110px;
        fill: url(#text-grad);
        letter-spacing: -1px;
      }
      
      .tagline-text {
        font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 30px;
        fill: #e2e8f0;
        letter-spacing: 0.5px;
        opacity: 0.9;
      }
      
      .badge-bg {
        fill: #4c1d95;
        fill-opacity: 0.35;
        stroke: #a78bfa;
        stroke-width: 1.5;
      }
      
      .badge-text {
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 800;
        font-size: 11px;
        fill: #c084fc;
        letter-spacing: 2.5px;
      }
      
      .mascot-node {
        animation: pulse 3s infinite ease-in-out;
      }
      
      /* Subtle floating effect for the brain */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
        100% { transform: translateY(0px); }
      }
      .floating-mascot {
        transform-origin: 200px 140px;
        animation: float 4s infinite ease-in-out;
      }
    </style>
  </defs>

  <!-- Card Background -->
  <rect width="1200" height="280" rx="24" fill="url(#bg-grad)" />

  <!-- Grid Overlay -->
  <rect width="1200" height="280" rx="24" fill="url(#grid)" />

  <!-- Ambient Glows -->
  <rect width="1200" height="280" rx="24" fill="url(#glow-left)" />
  <rect width="1200" height="280" rx="24" fill="url(#glow-right)" />

  <!-- Glowing Tech Accent Lines -->
  <path d="M 0 40 L 1200 40" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />
  <path d="M 0 240 L 1200 240" stroke="#ffffff" stroke-width="1" stroke-opacity="0.03" />

  <!-- Mascot Shadow (Non-floating) -->
  <ellipse cx="200" cy="245" rx="65" ry="12" fill="#000000" opacity="0.5" filter="url(#glow-blur)" />

  <!-- Floating Mascot Group -->
  <g class="floating-mascot">
    <!-- Memory Connections & Nodes (Behind Brain) -->
    <!-- Connection Lines -->
    <path d="M 90 90 L 140 120" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,4" stroke-opacity="0.6" fill="none" />
    <path d="M 100 190 L 130 170" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,4" stroke-opacity="0.6" fill="none" />
    <path d="M 300 90 L 260 120" stroke="#a78bfa" stroke-width="2" stroke-dasharray="4,4" stroke-opacity="0.6" fill="none" />
    <path d="M 310 180 L 270 170" stroke="#818cf8" stroke-width="2" stroke-dasharray="4,4" stroke-opacity="0.6" fill="none" />
    
    <!-- Outer Glows for Nodes -->
    <circle cx="90" cy="90" r="12" fill="#a78bfa" opacity="0.2" filter="url(#glow-blur)" />
    <circle cx="100" cy="190" r="10" fill="#818cf8" opacity="0.2" filter="url(#glow-blur)" />
    <circle cx="300" cy="90" r="12" fill="#a78bfa" opacity="0.2" filter="url(#glow-blur)" />
    <circle cx="310" cy="180" r="12" fill="#818cf8" opacity="0.2" filter="url(#glow-blur)" />

    <!-- Nodes -->
    <circle cx="90" cy="90" r="6" fill="#c084fc" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="100" cy="190" r="5" fill="#818cf8" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="300" cy="90" r="6.5" fill="#c084fc" stroke="#ffffff" stroke-width="1.5" />
    <circle cx="310" cy="180" r="5.5" fill="#818cf8" stroke="#ffffff" stroke-width="1.5" />

    <!-- Brain Body Outline & Fill -->
    <path d="M 200 225 C 170 225, 150 215, 140 195 C 115 195, 105 160, 120 135 C 105 115, 125 85, 160 85 C 175 85, 190 95, 200 100 C 210 95, 225 85, 240 85 C 275 85, 295 115, 280 135 C 295 160, 285 195, 260 195 C 250 215, 230 225, 200 225 Z" 
          fill="url(#brain-grad)" stroke="#2e1065" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round" />

    <!-- Brain Shadow overlay for 3D depth -->
    <path d="M 140 195 C 150 212, 180 220, 200 220 C 220 220, 250 212, 260 195 C 245 204, 220 208, 200 208 C 180 208, 155 204, 140 195 Z" 
          fill="#4c1d95" opacity="0.25" />

    <!-- Brain Highlight overlay for gloss -->
    <path d="M 160 89 C 175 89, 190 97, 200 102 C 210 97, 225 89, 240 89 C 252 89, 262 95, 268 102 C 250 94, 225 94, 200 104 C 175 94, 150 94, 132 102 C 138 95, 148 89, 160 89 Z" 
          fill="#ffffff" opacity="0.35" />

    <!-- Folds (Gyri) -->
    <!-- Hemispheres Center Line -->
    <path d="M 200 100 L 200 128" stroke="#2e1065" stroke-width="5" stroke-linecap="round" opacity="0.85" />
    <path d="M 200 225 L 200 206" stroke="#2e1065" stroke-width="5" stroke-linecap="round" opacity="0.85" />

    <!-- Left side folds -->
    <path d="M 145 115 C 150 100, 175 100, 180 115" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />
    <path d="M 125 140 C 135 145, 140 160, 135 175" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />
    <path d="M 155 205 C 165 200, 170 190, 165 180" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />

    <!-- Right side folds -->
    <path d="M 255 115 C 250 100, 225 100, 220 115" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />
    <path d="M 275 140 C 265 145, 260 160, 265 175" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />
    <path d="M 245 205 C 235 200, 230 190, 235 180" stroke="#4c1d95" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.75" />

    <!-- Face Elements -->
    <!-- Blush Cheeks -->
    <ellipse cx="148" cy="156" rx="9" ry="5.5" fill="#f472b6" opacity="0.65" />
    <ellipse cx="252" cy="156" rx="9" ry="5.5" fill="#f472b6" opacity="0.65" />

    <!-- Eyes (Slightly looking right/towards text) -->
    <!-- Left Eye -->
    <circle cx="168" cy="142" r="14" fill="#ffffff" stroke="#2e1065" stroke-width="3.5" />
    <circle cx="171" cy="142" r="8" fill="#0f172a" />
    <circle cx="173" cy="139" r="3" fill="#ffffff" />
    <circle cx="169" cy="145" r="1.5" fill="#ffffff" />

    <!-- Right Eye -->
    <circle cx="232" cy="142" r="14" fill="#ffffff" stroke="#2e1065" stroke-width="3.5" />
    <circle cx="235" cy="142" r="8" fill="#0f172a" />
    <circle cx="237" cy="139" r="3" fill="#ffffff" />
    <circle cx="233" cy="145" r="1.5" fill="#ffffff" />

    <!-- Happy Smile -->
    <path d="M 193 154 Q 200 163 207 154" stroke="#2e1065" stroke-width="4" stroke-linecap="round" fill="none" />
  </g>

  <!-- Typography & Brand (With Drop Shadow filter for premium feel) -->
  <g filter="url(#shadow)">
    <!-- LLM Memory Layer Badge -->
    <g transform="translate(0, 2)">
      <rect x="390" y="52" width="182" height="24" rx="12" class="badge-bg" />
      <text x="481" y="68" text-anchor="middle" class="badge-text">LLM MEMORY LAYER</text>
    </g>

    <!-- Wordmark USMC -->
    <text x="390" y="152" class="title-text">USMC</text>

    <!-- Tagline -->
    <text x="392" y="196" class="tagline-text">United Shared Memory Client</text>
  </g>

  <!-- Decorative Sparkles/Data Particles -->
  <g opacity="0.6">
    <!-- Sparkle 1 -->
    <path d="M 1120 70 L 1123 76 L 1129 77 L 1123 80 L 1120 86 L 1117 80 L 1111 77 L 1117 76 Z" fill="#c084fc" />
    <!-- Sparkle 2 -->
    <path d="M 370 210 L 372 214 L 376 215 L 372 217 L 370 221 L 368 217 L 364 215 L 368 214 Z" fill="#818cf8" />
    <!-- Sparkle 3 -->
    <path d="M 800 50 L 801.5 54 L 805.5 55 L 801.5 56.5 L 800 60.5 L 798.5 56.5 L 794.5 55 L 798.5 54 Z" fill="#c084fc" />
  </g>
</svg>
